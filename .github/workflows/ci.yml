name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      # Backend.Tests references backend/Backend.csproj, so restoring/building it
      # covers both projects. Run from the repo root so the tests actually execute.
      - run: dotnet restore Backend.Tests/Backend.Tests.csproj
      - run: dotnet build Backend.Tests/Backend.Tests.csproj --no-restore
      - run: dotnet test Backend.Tests/Backend.Tests.csproj --no-build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
